<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move Hermes — 产品管理</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
        .header{background:#1e293b;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #334155}
        .header h1{font-size:1.25rem;color:#38bdf8}
        .header nav a{color:#94a3b8;text-decoration:none;margin-left:1.5rem;font-size:.9rem}
        .header nav a:hover,.header nav a.active{color:#38bdf8}
        .toolbar{padding:1rem 2rem;display:flex;gap:1rem;align-items:center}
        .toolbar input{padding:.5rem .75rem;border:1px solid #475569;border-radius:6px;background:#1e293b;color:#e2e8f0;font-size:.9rem;flex:1;max-width:400px}
        .toolbar input:focus{outline:none;border-color:#38bdf8}
        .btn{padding:.5rem 1rem;border:none;border-radius:6px;font-size:.9rem;cursor:pointer}
        .btn-primary{background:#38bdf8;color:#0f172a;font-weight:600}
        .btn-sm{padding:.3rem .6rem;font-size:.8rem}
        .btn-danger{background:#f87171;color:#fff}
        .content{padding:0 2rem 2rem}
        .table-container{background:#1e293b;border-radius:10px;border:1px solid #334155;overflow:hidden}
        table{width:100%;border-collapse:collapse}
        th{background:#0f172a;padding:.75rem 1rem;text-align:left;font-size:.85rem;color:#64748b;font-weight:500}
        td{padding:.75rem 1rem;border-bottom:1px solid #1e293b;font-size:.9rem}
        tr:hover td{background:rgba(56,189,248,.03)}
        .empty-state{text-align:center;padding:4rem 2rem;color:#64748b}
        .empty-state h2{font-size:1.5rem;margin-bottom:.5rem;color:#94a3b8}
        .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
        .modal-overlay.show{display:flex}
        .modal{background:#1e293b;border-radius:12px;padding:2rem;width:90%;max-width:500px;border:1px solid #334155}
        .modal h2{margin-bottom:1.5rem;color:#38bdf8}
        .form-group{margin-bottom:1rem}
        .form-group label{display:block;margin-bottom:.3rem;font-size:.9rem;color:#cbd5e1}
        .form-group input,.form-group select{width:100%;padding:.6rem .8rem;border:1px solid #475569;border-radius:6px;background:#0f172a;color:#e2e8f0;font-size:.9rem}
        .form-group input:focus,.form-group select:focus{outline:none;border-color:#38bdf8}
        .modal-actions{display:flex;gap:.75rem;margin-top:1.5rem}
        .modal-actions .btn{flex:1;text-align:center}
        .actions-cell{display:flex;gap:.4rem}
    </style>
</head>
<body>
<div class="header">
    <h1>📦 Move Hermes</h1>
    <nav>
        <a href="/dashboard">看板</a>
        <a href="/orders">订单</a>
        <a href="/tasks">工序</a>
        <a href="/recognize">识图</a>
        <a href="/products">产品</a>
        <a href="/finance">财务</a>
        <a href="/alerts">预警</a>
        <a href="/卷料长度计算">卷料计算</a>
    </nav>
</div>
<div class="toolbar">
    <input type="text" id="searchInput" placeholder="搜索产品名称、规格..." oninput="loadProducts()">
    <button class="btn btn-primary" onclick="openCreateModal()">+ 新增产品</button>
</div>
<div class="content">
    <div class="table-container">
        <table>
            <thead><tr><th>产品名称</th><th>规格</th><th>单位</th><th>分类</th><th>创建日期</th><th>操作</th></tr></thead>
            <tbody id="productsBody"><tr><td colspan="6"><div class="empty-state"><p>加载中...</p></div></td></tr></tbody>
        </table>
    </div>
</div>
<div class="modal-overlay" id="productModal">
    <div class="modal">
        <h2 id="modalTitle">新增产品</h2>
        <div class="form-group"><label>产品名称 *</label><input type="text" id="prodName" placeholder="产品名称"></div>
        <div class="form-group"><label>规格</label><input type="text" id="prodSpec" placeholder="规格型号"></div>
        <div class="form-group"><label>单位</label><select id="prodUnit"><option value="件">件</option><option value="套">套</option><option value="吨">吨</option><option value="米">米</option><option value="个">个</option><option value="箱">箱</option></select></div>
        <div class="form-group"><label>分类</label><input type="text" id="prodCategory" placeholder="产品分类"></div>
        <div class="modal-actions">
            <button class="btn" style="background:#475569;color:#e2e8f0" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveProduct()">保存</button>
        </div>
    </div>
</div>
<script>
const API='/api';let editingId=null;
async function loadProducts(){
    var s=document.getElementById('searchInput').value;
    var url=API+'/products';
    if(s)url+='?search='+encodeURIComponent(s);
    try{var r=await fetch(url);renderProducts(await r.json());}catch(e){
    document.getElementById('productsBody').innerHTML='<tr><td colspan="6"><div class="empty-state"><h2>暂无产品</h2><p>点击新增产品创建</p></div></td></tr>';}
}
function renderProducts(ps){
    var tb=document.getElementById('productsBody');
    if(!ps||!ps.length){tb.innerHTML='<tr><td colspan="6"><div class="empty-state"><h2>暂无产品</h2><p>点击新增产品创建</p></div></td></tr>';return;}
    tb.innerHTML=ps.map(function(p){return '<tr><td><strong>'+esc(p.name)+'</strong></td><td>'+esc(p.spec||'-')+'</td><td>'+esc(p.unit||'件')+'</td><td>'+esc(p.category||'-')+'</td><td>'+fmt(p.created_at)+'</td><td class="actions-cell"><button class="btn btn-sm btn-primary" onclick="editProduct('+p.id+')">编辑</button><button class="btn btn-sm btn-danger" onclick="delProduct('+p.id+')">删除</button></td></tr>';}).join('');
}
function openCreateModal(){editingId=null;document.getElementById('modalTitle').textContent='新增产品';document.getElementById('prodName').value='';document.getElementById('prodSpec').value='';document.getElementById('prodCategory').value='';document.getElementById('productModal').classList.add('show');}
function closeModal(){document.getElementById('productModal').classList.remove('show');}
async function saveProduct(){
    var name=document.getElementById('prodName').value.trim();
    if(!name){alert('请填写产品名称');return;}
    var d={name:name,spec:document.getElementById('prodSpec').value.trim(),unit:document.getElementById('prodUnit').value,category:document.getElementById('prodCategory').value.trim()};
    try{var u=editingId?API+'/products/'+editingId:API+'/products';var m=editingId?'PUT':'POST';var r=await fetch(u,{method:m,headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(r.ok){closeModal();loadProducts();}else alert('保存失败');}catch(e){alert('保存失败');}
}
async function delProduct(id){if(!confirm('确定删除？'))return;try{var r=await fetch(API+'/products/'+id,{method:'DELETE'});if(r.ok)loadProducts();}catch(e){alert('删除失败');}}
async function editProduct(id){editingId=id;document.getElementById('modalTitle').textContent='编辑产品';try{var r=await fetch(API+'/products/'+id);var p=await r.json();document.getElementById('prodName').value=p.name||'';document.getElementById('prodSpec').value=p.spec||'';document.getElementById('prodUnit').value=p.unit||'件';document.getElementById('prodCategory').value=p.category||'';document.getElementById('productModal').classList.add('show');}catch(e){alert('加载失败');}}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'';}
function fmt(d){return d?d.replace('T',' ').substring(0,16):'-';}
document.getElementById('productModal').addEventListener('click',function(e){if(e.target===this)closeModal();});
loadProducts();
</script>
</body>
</html>
