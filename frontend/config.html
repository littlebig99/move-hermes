<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move Hermes — 配置向导</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            padding: 2rem;
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo h1 {
            font-size: 2rem;
            color: #38bdf8;
            margin-bottom: 0.5rem;
        }
        .logo p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid #334155;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #cbd5e1;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #475569;
            border-radius: 8px;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.1);
        }
        .btn {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #38bdf8;
            color: #0f172a;
        }
        .btn-primary:hover {
            background: #7dd3fc;
        }
        .hint {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 0.25rem;
        }
        .preset-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .preset-btn {
            padding: 0.5rem;
            border: 1px solid #475569;
            border-radius: 6px;
            background: transparent;
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .preset-btn:hover {
            border-color: #38bdf8;
            color: #38bdf8;
        }
        .status {
            text-align: center;
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            display: block;
            background: #064e3b;
            color: #6ee7b7;
        }
        .status.error {
            display: block;
            background: #7f1d1d;
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>📦 Move Hermes</h1>
            <p>智能订单管理系统 · 首次配置</p>
        </div>
        
        <div class="card">
            <div class="form-group">
                <label>AI 提供商</label>
                <select id="provider">
                    <option value="openai">OpenAI (GPT-4o)</option>
                    <option value="claude">Anthropic (Claude)</option>
                    <option value="aliyun">阿里云 (通义千问)</option>
                    <option value="custom">自定义 API</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxx">
                <p class="hint">您的 API Key 仅存储在本地，不会上传到任何服务器</p>
            </div>
            
            <div class="form-group">
                <label>模型</label>
                <select id="model">
                    <option value="gpt-4o-mini">GPT-4o Mini（推荐，性价比高）</option>
                    <option value="gpt-4o">GPT-4o（更强，适合复杂单据）</option>
                    <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                    <option value="qwen-plus">通义千问 Plus</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>自定义 API 地址（可选）</label>
                <input type="text" id="baseUrl" placeholder="https://api.openai.com/v1">
            </div>
            
            <div class="form-group">
                <label>快速选择预设</label>
                <div class="preset-btns">
                    <button class="preset-btn" onclick="setPreset('openai','gpt-4o-mini','sk-')">OpenAI 推荐</button>
                    <button class="preset-btn" onclick="setPreset('claude','claude-sonnet-4-20250514','sk-')">Claude 推荐</button>
                    <button class="preset-btn" onclick="setPreset('aliyun','qwen-plus','')">阿里云</button>
                    <button class="preset-btn" onclick="setPreset('custom','','')">自定义</button>
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="saveConfig()">保存配置并启动</button>
            
            <div id="status" class="status"></div>
        </div>
    </div>
    
    <script>
        function setPreset(provider, model, keyPrefix) {
            document.getElementById('provider').value = provider;
            document.getElementById('model').value = model;
            if (keyPrefix) {
                document.getElementById('apiKey').placeholder = keyPrefix + 'your-api-key';
            }
        }
        
        async function saveConfig() {
            const status = document.getElementById('status');
            const config = {
                provider: document.getElementById('provider').value,
                model: document.getElementById('model').value,
                api_key: document.getElementById('apiKey').value,
                base_url: document.getElementById('baseUrl').value
            };
            
            if (!config.api_key) {
                status.className = 'status error';
                status.textContent = '请输入 API Key';
                return;
            }
            
            try {
                const resp = await fetch('/api/config/save', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(config)
                });
                
                if (resp.ok) {
                    status.className = 'status success';
                    status.textContent = '✅ 配置已保存！即将跳转到看板...';
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    status.className = 'status error';
                    status.textContent = '❌ 配置保存失败，请重试';
                }
            } catch (e) {
                // 本地开发环境可能没有后端，先保存本地
                localStorage.setItem('move_hermes_config', JSON.stringify(config));
                status.className = 'status success';
                status.textContent = '✅ 配置已保存！即将跳转到看板...';
                setTimeout(() => {
                    window.location.href = '/dashboard';
                }, 1500);
            }
        }
    </script>
</body>
</html>
